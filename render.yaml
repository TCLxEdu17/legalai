services:
  - type: web
    name: legalai-api
    runtime: docker
    dockerfilePath: Dockerfile.api
    dockerContext: .
    plan: starter
    healthCheckPath: /api/v1
    envVars:
      - key: NODE_ENV
        value: production
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_CHAT_MODEL
        value: gpt-4o
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: OPENAI_EMBEDDING_DIMENSIONS
        value: "1536"
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: RAG_SIMILARITY_THRESHOLD
        value: "0.30"
      - key: RAG_MAX_CHUNKS
        value: "5"
      - key: MAX_FILE_SIZE_MB
        value: "50"
      - key: UPLOAD_DIR
        value: /app/uploads
      # — preencher manualmente no painel do Render —
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
