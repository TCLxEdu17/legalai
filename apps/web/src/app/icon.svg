<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Fundo -->
  <rect width="32" height="32" rx="8" fill="#2535ea"/>

  <!-- Pilar central -->
  <rect x="15" y="7" width="2" height="16" rx="1" fill="white"/>

  <!-- Base -->
  <rect x="10" y="23" width="12" height="2" rx="1" fill="white"/>

  <!-- Barra horizontal -->
  <rect x="7" y="9" width="18" height="1.5" rx="0.75" fill="white"/>

  <!-- Prato esquerdo -->
  <path d="M7.5 11 Q9.5 15 11.5 11" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <line x1="7.5" y1="11" x2="7" y2="10.5" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="11.5" y1="11" x2="12" y2="10.5" stroke="white" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Prato direito -->
  <path d="M20.5 11 Q22.5 15 24.5 11" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <line x1="20.5" y1="11" x2="20" y2="10.5" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="24.5" y1="11" x2="25" y2="10.5" stroke="white" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Pontos de circuito (tech) -->
  <circle cx="9.5" cy="22" r="1" fill="#6280fd"/>
  <circle cx="22.5" cy="22" r="1" fill="#6280fd"/>
  <circle cx="16" cy="7" r="1.5" fill="#96aeff"/>
</svg>
